name: tourism-make-easy

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: tme-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tme_admin
      POSTGRES_PASSWORD: tme_secret
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tme_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Central Service (port 8080) ─────────────────────────────
  central-service:
    container_name: tme-central
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: central-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Inventory Service (port 8081) ───────────────────────────
  inventory-service:
    container_name: tme-inventory
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: inventory-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Reservation Service (port 8082) ─────────────────────────
  reservation-service:
    container_name: tme-reservation
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: reservation-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Resort Service (port 8083) ──────────────────────────────
  resort-service:
    container_name: tme-resort
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
      args:
        SERVICE_NAME: resort-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
